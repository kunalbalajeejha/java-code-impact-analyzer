# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=demo-microservice

# ── Datasource (H2 in-memory) ─────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:demodb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Impact Analyzer ───────────────────────────────────────────────────────────
# OFF in all environments by default.
# To enable locally: run with --spring.profiles.active=local
# OR pass: -Dimpact.analyzer.enabled=true
impact.analyzer.enabled=false
spring.jpa.defer-datasource-initialization=true