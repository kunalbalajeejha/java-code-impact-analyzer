# ═══════════════════════════════════════════════════════════════════════════════
#  LOCAL PROFILE — impact analyzer is active here and ONLY here
#  Run with:  --spring.profiles.active=local
#             or set SPRING_PROFILES_ACTIVE=local in your IDE run config
# ═══════════════════════════════════════════════════════════════════════════════

# ── Enable Impact Analyzer ────────────────────────────────────────────────────
impact.analyzer.enabled=true
impact.analyzer.base-packages=com.demo
impact.analyzer.max-reports-per-method=20

# ── Optional: verbose SQL logging in local ────────────────────────────────────
spring.jpa.show-sql=true
logging.level.com.demo=DEBUG
logging.level.com.impactanalyzer=INFO
